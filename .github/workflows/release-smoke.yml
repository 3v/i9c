name: release-smoke

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run smoke tests
        run: make smoke
